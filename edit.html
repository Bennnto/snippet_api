<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input,
        textarea {
            display : flex;
            flex-direction: column;
            width : 100%;
        }
        button {
            background : lightskyblue;
            cursor : pointer;
            color : black;
            margin : 10px 5px 5px 0;
            padding : 10px 5px 5px 5px;
        }
        input {
            margin : 10px 5px 5px 0;
            padding : 10px 5px 5px 5px;
        }
        textarea{
            margin : 10px 5px 5px 0;
            padding : 10px 5px 5px 5px;
        }
    </style>
    <title>Edit-HTML</title>
</head>
<body>
    <button onclick="window.location.href='/home'">Submit Page</button>
    <button onclick="window.location.href='/index'">Code Index</button>
    <input type="number" id="topic_id" placeholder="Topic ID Can see from index">
    <button onclick="loadcode()">View Code</button>
    <textarea id="code" placeholder="code"></textarea>
    <button onclick="editcode()">Edit Code</button>
    <div id ="result"></div>
    <script>
        const API_URL = "https://snippet-api-4irp.onrender.com"
        async function editcode() {
            const topic_id = document.getElementById('topic_id').value
            const new_code = document.getElementById('code').value
            
            if (!topic_id) {
                document.getElementById('result').innerHTML = '<p style="color:red;">Please enter Topic ID</p>'
                return
            }
            
            try{
                const response = await fetch(API_URL+'/snip/'+topic_id+'/edit', {
                    method : "PUT",
                    headers : { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        old_code: "",
                        new_code: new_code
                    })
                });
                
                if (!response.ok){
                    const error_data = await response.json();
                    throw new Error(`Error ${response.status}: ${error_data.detail || response.statusText}`)
                }
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `<p style="color:green;">✅ Message: Code Updated Successfully!</p>`
            } catch (error) {
                console.error('Full Error:', error);
                document.getElementById('result').innerHTML = `<p style="color:red;">❌ Error: ${error.message}</p>`
            }
        }
        async function loadcode() {
            const topic_id = document.getElementById('topic_id').value

            try {
                const response = await fetch(API_URL+'/snip/'+topic_id, {
                    method : "GET",
                    headers : { "Content-Type": "application/json" },
            });

            if (!response.ok){
                    throw new Error(`Error: ${response.code} ${response.statusText}`)
                }
            let html =''
            const data = await response.json();
            html += `
            <p>${data.topic_id} ${data.topic}</p>
            <br><p>${data.description}</p>
            <pre style="background: #f0f0f0; padding: 10px; border-radius: 5px; overflow-x: auto;"><code>${escapeHTML(data.code)}</code<pre>`
            document.getElementById('result').innerHTML = html
            document.querySelectorAll('pre code').foreach(block => {
                hljs.highlightElement(block)
            })
        } catch (error) {
            console.error('Error', error)
        }
        }
        function escapeHTML(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }
        return text.replace(/[&<>"']/g, m => map[m])
    }
    </script>
</body>
</html>
