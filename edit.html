<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input,
        textarea {
            display : flex;
            flex-direction: column;
            width : 100%;
        }
        button {
            background : lightskyblue;
            cursor : pointer;
            color : black;
            margin : 10px 5px 5px 0;
            padding : 10px 5px 5px 5px;
        }
        input {
            margin : 10px 5px 5px 0;
            padding : 10px 5px 5px 5px;
        }
        textarea{
            margin : 10px 5px 5px 0;
            padding : 10px 5px 5px 5px;
        }
        select {
            margin : 10px 5px 5px 0;
            padding : 10px 5px 5px 5px;
            width: 100%;
        }
        label {
            margin-top: 10px;
            font-weight: bold;
        }
        #tags_container {
            margin: 10px 5px 5px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
    <title>Edit-HTML</title>
</head>
<body>
    <button onclick="window.location.href='/home'">Submit Page</button>
    <button onclick="window.location.href='/index'">Code Index</button>
    <h3>Edit Code Snippet</h3>
    <input type="number" id="topic_id" placeholder="Topic ID Can see from index">
    <button onclick="loadcode()">View Code</button>
    
    <label for="category_id"><strong>Category:</strong></label>
    <select id="category_id">
        <option value="">-- Select Category --</option>
    </select>
    
    <label for="tags"><strong>Tags:</strong></label>
    <div id="tags_container"></div>
    
    <textarea id="code" placeholder="code"></textarea>
    <button onclick="editcode()">Edit Code</button>
    <div id ="result"></div>
    <script>
        const API_URL = "https://snippet-api-4irp.onrender.com"
        
        // Load categories and tags on page load
        window.addEventListener('load', () => {
            loadCategories()
            loadTags()
        })
        
        async function loadCategories() {
            try {
                const response = await fetch(API_URL + '/categories')
                const categories = await response.json()
                const select = document.getElementById('category_id')
                select.innerHTML = '<option value="">-- Select Category --</option>'
                
                categories.forEach(cat => {
                    const option = document.createElement('option')
                    option.value = cat.category_id
                    option.textContent = cat.category_name
                    select.appendChild(option)
                })
            } catch (error) {
                console.error('Error loading categories:', error)
            }
        }
        
        async function loadTags() {
            try {
                const response = await fetch(API_URL + '/tags')
                const tags = await response.json()
                const container = document.getElementById('tags_container')
                container.innerHTML = ''
                
                tags.forEach(tag => {
                    const label = document.createElement('label')
                    label.style.display = 'flex'
                    label.style.marginBottom = '5px'
                    label.innerHTML = `
                        <input type="checkbox" value="${tag.tag_id}" class="tag_checkbox" style="width:auto; margin-right:10px;">
                        ${tag.tag_name}
                    `
                    container.appendChild(label)
                })
            } catch (error) {
                console.error('Error loading tags:', error)
            }
        }
        async function editcode() {
            const topic_id = document.getElementById('topic_id').value
            const new_code = document.getElementById('code').value
            const category_id = document.getElementById('category_id').value
            const tag_ids = Array.from(document.querySelectorAll('.tag_checkbox:checked')).map(cb => parseInt(cb.value))
            
            if (!topic_id) {
                document.getElementById('result').innerHTML = '<p style="color:red;">Please enter Topic ID</p>'
                return
            }
            
            try{
                const payload = {
                    topic: "",
                    description: "",
                    code: new_code,
                    category_id: category_id ? parseInt(category_id) : null,
                    tag_ids: tag_ids
                }
                
                const response = await fetch(API_URL+'/snip/'+topic_id, {
                    method : "PUT",
                    headers : { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok){
                    const error_data = await response.json();
                    throw new Error(`Error ${response.status}: ${error_data.detail || response.statusText}`)
                }
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `<p style="color:green;">✅ Message: Code Updated Successfully!</p>`
            } catch (error) {
                console.error('Full Error:', error);
                document.getElementById('result').innerHTML = `<p style="color:red;">❌ Error: ${error.message}</p>`
            }
        }
        async function loadcode() {
            const topic_id = document.getElementById('topic_id').value

            try {
                const response = await fetch(API_URL+'/snip/'+topic_id, {
                    method : "GET",
                    headers : { "Content-Type": "application/json" },
            });

            if (!response.ok){
                    throw new Error(`Error: ${response.code} ${response.statusText}`)
                }
            let html =''
            const data = await response.json();
            let categoryName = data.category ? data.category.category_name : 'N/A'
            let tagNames = data.tags ? data.tags.map(t => t.tag_name).join(', ') : 'None'
            
            html += `
            <p><strong>${data.topic_id}</strong> ${data.topic}</p>
            <p><em>${data.description}</em></p>
            <p><strong>Category:</strong> ${categoryName}</p>
            <p><strong>Tags:</strong> ${tagNames}</p>
            <pre style="background: #f0f0f0; padding: 10px; border-radius: 5px; overflow-x: auto;"><code>${escapeHTML(data.code)}</code></pre>`
            document.getElementById('result').innerHTML = html
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block)
            })
        } catch (error) {
            console.error('Error', error)
        }
        }
        function escapeHTML(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }
        return text.replace(/[&<>"']/g, m => map[m])
    }
    </script>
</body>
</html>
