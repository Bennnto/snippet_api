<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code snip</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input,
        textarea
         {
            display : flex;
            flex-direction: Column;
            width: 100%;
            padding: 5px;
            margin: 10px 0;
        }
        button {
            background: silver;
            color: black;
            padding: 5px 10px;
            cursor: pointer;
            margin: 5px 5px 5px 5px;
            transition: background-color 0.2s;
        }
        #result {
            margin-top: 15px;
        }
        button:active{
            background: gray;
        }
        select {
            padding: 5px;
            margin: 10px 0;
            width: 100%;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
        }
        #tags_container {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #createResult {
            font-size: 14px;
        }
        input[type="text"], input[type="color"] {
            font-size: 14px;
        }
   
        
    </style>
</head>
<body>
    <button onclick="window.location.href='/edit'">Edit Page</button>
    <button onclick="window.location.href='/index'">code index</button>
    
    <h3>🆕 Create Category/Tag</h3>
    <div style="border: 1px solid #ddd; padding: 15px; margin: 15px 0; border-radius: 5px; background: #f9f9f9;">
        <div style="margin-bottom: 10px;">
            <input type="text" id="newCategoryName" placeholder="Category Name" style="width: 200px; padding: 5px;">
            <input type="color" id="newCategoryColor" value="#007BFF" style="width: 50px; height: 35px; cursor: pointer;">
            <button onclick="createCategory()" style="padding: 5px 10px;">Add Category</button>
        </div>
        <div>
            <input type="text" id="newTagName" placeholder="Tag Name" style="width: 200px; padding: 5px;">
            <button onclick="createTag()" style="padding: 5px 10px;">Add Tag</button>
        </div>
        <div id="createResult" style="margin-top: 10px; color: green;"></div>
    </div>
    
    <h3>➕ Add Code Snippet</h3>
    <input type="text" id="description" placeholder="description">
    
    <label for="category_id"><strong>Category:</strong></label>
    <select id="category_id">
        <option value="">-- Select Category --</option>
    </select>
    
    <label for="tags"><strong>Tags:</strong></label>
    <div id="tags_container"></div>
    
    <textarea id="code" placeholder="code here!"></textarea>
    <button onclick="submitcode()">Submit</button>
    <button onclick="allcode()">View All</button>
    <input type="number" id="topic_id" placeholder="topic id">
    <button onclick="loadcode()">load Code</button>
    <button onclick="deletecode()">Delete</button>
    <div id="result"></div>
    
    <script>
        function escapeHTML(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }
            return text.replace(/[&<>"']/g, m => map[m])
        const API_URL = "https://snippet-api-4irp.onrender.com"
        
        // Create Category Function
        async function createCategory() {
            const categoryName = document.getElementById('newCategoryName').value.trim()
            const categoryColor = document.getElementById('newCategoryColor').value
            const resultDiv = document.getElementById('createResult')
            
            if (!categoryName) {
                resultDiv.innerHTML = '<p style="color:red;">❌ Category name cannot be empty</p>'
                return
            }
            
            try {
                const response = await fetch(API_URL + '/categories', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('Benpromkaew:Ben107468')
                    },
                    body: JSON.stringify({
                        category_name: categoryName,
                        color: categoryColor
                    })
                })
                
                if (!response.ok) {
                    const error = await response.json()
                    throw new Error(error.detail || 'Failed to create category')
                }
                
                const data = await response.json()
                resultDiv.innerHTML = `<p style="color:green;">✅ Category "${categoryName}" created! ID: ${data.category_id}</p>`
                document.getElementById('newCategoryName').value = ''
                loadCategories() // Refresh dropdown
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:red;">❌ Error: ${error.message}</p>`
                console.error('Error creating category:', error)
            }
        }
        
        // Create Tag Function
        async function createTag() {
            const tagName = document.getElementById('newTagName').value.trim()
            const resultDiv = document.getElementById('createResult')
            
            if (!tagName) {
                resultDiv.innerHTML = '<p style="color:red;">❌ Tag name cannot be empty</p>'
                return
            }
            
            try {
                const response = await fetch(API_URL + '/tags', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('Benpromkaew:Ben107468')
                    },
                    body: JSON.stringify({
                        tag_name: tagName
                    })
                })
                
                if (!response.ok) {
                    const error = await response.json()
                    throw new Error(error.detail || 'Failed to create tag')
                }
                
                const data = await response.json()
                resultDiv.innerHTML = `<p style="color:green;">✅ Tag "${tagName}" created! ID: ${data.tag_id}</p>`
                document.getElementById('newTagName').value = ''
                loadTags() // Refresh checkboxes
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:red;">❌ Error: ${error.message}</p>`
                console.error('Error creating tag:', error)
            }
        }
        window.addEventListener('load', () => {
            loadCategories()
            loadTags()
        })
        
        async function loadCategories() {
            try {
                const response = await fetch(API_URL + '/categories')
                const categories = await response.json()
                const select = document.getElementById('category_id')
                select.innerHTML = '<option value="">-- Select Category --</option>'
                
                categories.forEach(cat => {
                    const option = document.createElement('option')
                    option.value = cat.category_id
                    option.textContent = cat.category_name
                    select.appendChild(option)
                })
            } catch (error) {
                console.error('Error loading categories:', error)
            }
        }
        
        async function loadTags() {
            try {
                const response = await fetch(API_URL + '/tags')
                const tags = await response.json()
                const container = document.getElementById('tags_container')
                container.innerHTML = ''
                
                tags.forEach(tag => {
                    const label = document.createElement('label')
                    label.style.display = 'flex'
                    label.style.marginBottom = '5px'
                    label.innerHTML = `
                        <input type="checkbox" value="${tag.tag_id}" class="tag_checkbox" style="width:auto; margin-right:10px;">
                        ${tag.tag_name}
                    `
                    container.appendChild(label)
                })
            } catch (error) {
                console.error('Error loading tags:', error)
            }
        }
        
        async function submitcode() {
            try{
            const code_topic = document.getElementById("topic").value.trim()
            const code_description = document.getElementById("description").value
            const code_detail = document.getElementById("code").value
            const category_id = document.getElementById("category_id").value
            const tag_ids = Array.from(document.querySelectorAll('.tag_checkbox:checked')).map(cb => parseInt(cb.value))
            
            if (!code_topic) {
                document.getElementById("result").innerHTML = "Topic cannot be empty"
                return
            }

            const payload = {
                topic : code_topic,
                description : code_description || null,
                code : code_detail,
                category_id: category_id ? parseInt(category_id) : null,
                tag_ids: tag_ids
            }
            document.getElementById("result").innerHTML = "Creating Code 🧑‍💻"
            console.log('Payload', payload)

            const response = await fetch(API_URL+'/snip/', {
                method : 'POST',
                headers : { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            console.log('Response status', response.status);
            if (!response.ok){
                throw new Error(`API Error : ${response.status} ${response.statusText}`)
            }
            const data = await response.json();
            document.getElementById("result").innerHTML = `✅ Create Code snip : ID ${data.topic_id}`

            document.getElementById("topic").value = '';
            document.getElementById("description").value = '';
            document.getElementById("code").value = '';
        } catch (error) {
            console.error('Full error details:', error);
            document.getElementById('result').innerHTML = `❌ Error: ${error.message}<br><small>Check console (F12) for details</small>`;
        }
    }


        async function loadcode(){
            try{
            const topic_id = document.getElementById("topic_id").value.trim()
            if (!topic_id) {
                document.getElementById('result').innerHTML = 'Topic ID cannot be empty'
                return
            }
            const response = await fetch(API_URL+'/snip/'+topic_id, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
            })

            if (!response.ok){
                throw new Error(`API Error: ${response.status} ${response.statusText}`)
            }
            const data = await response.json();
            document.getElementById('result').innerHTML = `
            <p><strong>ID ${data.topic_id}:</strong> ${data.topic}</p>
            <p>${data.description}</p>
            <pre style="background: #f0f0f0; padding: 10px; border-radius: 5px;"><code>${escapeHTML(data.code)}</code></pre>`
            
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block)
            })
        } catch (error) {
            console.log('Error', error)
            document.getElementById('result').innerHTML = `Error: ${error.message}`
        }
    }


        async function allcode(){
            try{
            const response = await fetch(API_URL+'/snip/', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
            })

            if (!response.ok){
                throw new Error(`API Error: ${response.status} ${response.statusText}`)
            }
            const data = await response.json();
            let html = '<h2>All Code Snippets</h2>'
            data.forEach(item => {
                html += `
                <div style="border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px;">
                    <p><strong>${item.topic_id}. ${item.topic}</strong></p>
                    <p>${item.description}</p>
                    <pre style="background: #f0f0f0; padding: 10px; border-radius: 5px; overflow-x: auto;"><code>${escapeHTML(item.code)}</code></pre>
                </div>`
            })
            document.getElementById('result').innerHTML = html
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block)
            })
        } catch (error) {
            console.log('Error', error)
            document.getElementById('result').innerHTML = `Error: ${error.message}`
        }
    }
        async function deletecode() {
            const topic_id = document.getElementById('topic_id').value
            try{
                const response = await fetch(API_URL+'/snip/'+topic_id, {
                    method: 'Delete',
                    headers: { 'Content-Type': 'application/json' }
                })
                if (!response.ok){
                    throw new Error(`API Error : ${response.status} ${response.statusText}`)
                }
                const data = await response.json()
                document.getElementById('result').innerHTML = `${data.message}`
                document.getElementById('topic_id').innerHTML = ''
            } catch (error) {
                cosole.log('Error', error)
                document.getElementById('result').innerHTML = `Topic Id Not Found`
            }
        }
    </script>
</body>
</html>
